<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GK Cost Split V3</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial,sans-serif;max-width:1200px;margin:auto;padding:15px}
.dark{background:#121212;color:#eee}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:10px 0}
input,select,button{padding:10px;margin:5px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
.stat{display:inline-block;padding:10px;border:1px solid #ccc;margin:5px;border-radius:8px}
</style>
</head>
<body>
<h2>💰 GK Cost Split V3</h2>
<button onclick="toggleDark()">Dark Mode</button>

<div class="card">
<h3>Groups</h3>
<input id="groupName" placeholder="Goa Trip">
<button onclick="createGroup()">Create Group</button>
<select id="groupSelect" onchange="loadGroup()"></select>
</div>

<div class="card">
<h3>Members</h3>
<input id="memberName" placeholder="Member Name">
<button onclick="addMember()">Add Member</button>
<ul id="memberList"></ul>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseDesc" placeholder="Dinner">
<input id="expenseAmt" type="number" placeholder="Amount">
<select id="paidBy"></select>
<select id="splitType">
<option value="equal">Equal Split</option>
<option value="custom">Custom Amount</option>
</select>
<input id="customSplit" placeholder="Custom amount per member (optional)">
<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Hotel</option>
<option>Shopping</option>
<option>Entertainment</option>
</select>
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>Expenses</h3>
<table>
<thead><tr><th>Description</th><th>Amount</th><th>Paid By</th><th>Category</th></tr></thead>
<tbody id="expenseTable"></tbody>
</table>
</div>

<div class="card">
<h3>Settlement</h3>
<button onclick="calculate()">Calculate Settlement</button>
<div id="settlement"></div>
</div>

<div class="card">
<button onclick="exportCSV()">Export CSV</button>
<button onclick="backupJSON()">Backup JSON</button>
</div>

<script>
let db=JSON.parse(localStorage.getItem('gkcostsplitv3')||'{"groups":{}}');
let current='';

function save(){
 localStorage.setItem('gkcostsplitv3',JSON.stringify(db));
 renderGroups();
}

function createGroup(){
 let g=groupName.value.trim();
 if(!g)return;
 db.groups[g]={members:[],expenses:[]};
 current=g;
 save();
 render();
}

function renderGroups(){
 groupSelect.innerHTML='';
 Object.keys(db.groups).forEach(g=>{
   groupSelect.innerHTML+=`<option ${g===current?'selected':''}>${g}</option>`;
 });
}

function loadGroup(){
 current=groupSelect.value;
 render();
}

function addMember(){
 if(!current)return alert('Create group first');
 let m=memberName.value.trim();
 if(!m)return;
 db.groups[current].members.push(m);
 memberName.value='';
 save();
 render();
}

function render(){
 let g=db.groups[current];
 if(!g)return;

 memberList.innerHTML='';
 paidBy.innerHTML='';
 expenseTable.innerHTML='';

 g.members.forEach(m=>{
   memberList.innerHTML+=`<li>${m}</li>`;
   paidBy.innerHTML+=`<option>${m}</option>`;
 });

 let total=0;

 g.expenses.forEach(e=>{
   total+=e.amount;
   expenseTable.innerHTML+=`<tr>
   <td>${e.desc}</td>
   <td>₹${e.amount}</td>
   <td>${e.paidBy}</td>
   <td>${e.category}</td>
   </tr>`;
 });

 stats.innerHTML=`
 <div class="stat">Members: ${g.members.length}</div>
 <div class="stat">Expenses: ${g.expenses.length}</div>
 <div class="stat">Total Spend: ₹${total.toFixed(2)}</div>`;
}

function addExpense(){
 let g=db.groups[current];

 g.expenses.push({
   desc:expenseDesc.value,
   amount:+expenseAmt.value,
   paidBy:paidBy.value,
   category:category.value,
   splitType:splitType.value,
   custom:customSplit.value
 });

 save();
 render();
}

function calculate(){
 let g=db.groups[current];
 if(!g)return;

 let bal={};
 g.members.forEach(m=>bal[m]=0);

 let total=0;

 g.expenses.forEach(e=>{
   total+=e.amount;
   bal[e.paidBy]+=e.amount;
 });

 let share=total/g.members.length;

 g.members.forEach(m=>{
   bal[m]-=share;
 });

 let creditors=[];
 let debtors=[];

 Object.entries(bal).forEach(([name,val])=>{
   if(val>0) creditors.push([name,val]);
   if(val<0) debtors.push([name,-val]);
 });

 let html='';
 let i=0,j=0;

 while(i<debtors.length && j<creditors.length){
   let amt=Math.min(debtors[i][1],creditors[j][1]);

   html+=`${debtors[i][0]} owes ${creditors[j][0]} ₹${amt.toFixed(2)}<br>`;

   debtors[i][1]-=amt;
   creditors[j][1]-=amt;

   if(debtors[i][1]<0.01) i++;
   if(creditors[j][1]<0.01) j++;
 }

 settlement.innerHTML=html||'All Settled';
}

function exportCSV(){
 let g=db.groups[current];
 let csv='Description,Amount,PaidBy,Category\n';

 g.expenses.forEach(e=>{
  csv+=`${e.desc},${e.amount},${e.paidBy},${e.category}\n`;
 });

 let a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([csv]));
 a.download=current+'.csv';
 a.click();
}

function backupJSON(){
 let a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)]));
 a.download='gkcostsplit-backup.json';
 a.click();
}

function toggleDark(){
 document.body.classList.toggle('dark');
}

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('service-worker.js');
}

renderGroups();
</script>
</body>
</html>
