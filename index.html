<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Splitter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <style>
        :root { --primary: #4CAF50; --bg: #f4f4f9; --text: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 600px; margin: 0 auto; }
        h1, h2 { text-align: center; color: var(--primary); }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        button:hover { background: #45a049; }
        input, select { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .positive { color: green; font-weight: bold; }
        .negative { color: red; font-weight: bold; }
        .tag { background: #eee; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>💸 Split Costs</h1>

    <div class="card">
        <h2>1. Event Details</h2>
        <select id="scenario">
            <option value="Home Expenses">Home Expenses 🏠</option>
            <option value="Travel Trip">Travel Trip ✈️</option>
            <option value="Weekend Outing">Weekend Outing 🍻</option>
            <option value="Other">Other 🛒</option>
        </select>
    </div>

    <div class="card">
        <h2>2. Participants</h2>
        <button onclick="addParticipant()">Add from Contacts / Manual</button>
        <div id="participants-list"></div>
    </div>

    <div class="card">
        <h2>3. Add Expense</h2>
        <input type="text" id="desc" placeholder="What was it for? (e.g., Dinner)">
        <input type="number" id="amount" placeholder="Amount ($)">
        <select id="payer">
            <option value="">-- Who Paid? --</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <h2>Balances</h2>
        <div id="balances-list"><p style="text-align:center; color:#888;">Add people and expenses to see balances.</p></div>
    </div>

    <script>
        let participants = [];
        let expenses = [];

        // Try to use the native Contact Picker API, fallback to manual entry
        async function addParticipant() {
            const supported = ('contacts' in navigator && 'ContactsManager' in window);
            if (supported) {
                try {
                    const contacts = await navigator.contacts.select(['name'], { multiple: true });
                    contacts.forEach(c => {
                        if (c.name[0] && !participants.includes(c.name[0])) {
                            participants.push(c.name[0]);
                        }
                    });
                    updateUI();
                    return;
                } catch (ex) {
                    console.log("Contact picker failed or cancelled, falling back.");
                }
            }
            
            // Fallback for desktop / unsupported browsers
            const name = prompt("Enter participant's name:");
            if (name && !participants.includes(name.trim())) {
                participants.push(name.trim());
                updateUI();
            }
        }

        function updateUI() {
            // Update Participants List
            document.getElementById('participants-list').innerHTML = participants.map(p => `<div class="flex-between"><span>👤 ${p}</span></div>`).join('');
            
            // Update Payer Dropdown
            const payerSelect = document.getElementById('payer');
            payerSelect.innerHTML = '<option value="">-- Who Paid? --</option>' + participants.map(p => `<option value="${p}">${p}</option>`).join('');
            
            calculateBalances();
        }

        function addExpense() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payer = document.getElementById('payer').value;
            const scenario = document.getElementById('scenario').value;

            if (!desc || isNaN(amount) || amount <= 0 || !payer) {
                alert("Please fill in all expense fields correctly.");
                return;
            }

            if (participants.length === 0) {
                alert("Please add participants first!");
                return;
            }

            expenses.push({ desc, amount, payer, scenario });
            
            // Clear inputs
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            calculateBalances();
        }

        function calculateBalances() {
            if (participants.length === 0) return;

            // Initialize balances
            let balances = {};
            participants.forEach(p => balances[p] = 0);

            // Calculate Net balances
            expenses.forEach(exp => {
                const splitAmount = exp.amount / participants.length;
                participants.forEach(p => {
                    if (p === exp.payer) {
                        balances[p] += (exp.amount - splitAmount); // Payer gets back their amount minus their own share
                    } else {
                        balances[p] -= splitAmount; // Everyone else owes their share
                    }
                });
            });

            // Render Balances
            const balancesList = document.getElementById('balances-list');
            if (expenses.length === 0) return;

            let html = '';
            for (let person in balances) {
                const bal = balances[person].toFixed(2);
                if (bal > 0) {
                    html += `<div class="flex-between"><span>${person}</span> <span class="positive">Gets $${bal}</span></div>`;
                } else if (bal < 0) {
                    html += `<div class="flex-between"><span>${person}</span> <span class="negative">Owes $${Math.abs(bal).toFixed(2)}</span></div>`;
                } else {
                    html += `<div class="flex-between"><span>${person}</span> <span>Settled up</span></div>`;
                }
            }
            
            html += `<hr><p style="font-size: 12px; text-align: center;">Total Expenses: $${expenses.reduce((sum, e) => sum + e.amount, 0).toFixed(2)}</p>`;
            balancesList.innerHTML = html;
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker registered!');
                }).catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
